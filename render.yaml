services:
  - type: web
    name: it-random-api
    env: python
    plan: free
    autoDeploy: false
    buildCommand: pip install -r requirements.txt && ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,127.0.0.1,localhost"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true

  - type: static
    name: it-random-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: false
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://it-random-api.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
